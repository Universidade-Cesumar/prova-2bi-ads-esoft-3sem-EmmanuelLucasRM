<!DOCTYPE html>
<html lang='pt-br'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Almoxarifado</title>
    <link rel='stylesheet' href='style.css'>
</head>

<body>
    <h1>Almoxarifado de Materiais de Saúde</h1>
    <p>Cadastrar Material</p>

    <div class="cadastrar-material">
        <input type="text" id="input-nome" placeholder="Nome">
        <input type="number" id="input-quantidade" placeholder="Quantidade">
        <button id="btn-cadastrar">Cadastrar</button>
    </div>

    <p>Lista de Materiais</p>
    <div class="lista">
        <table id="lista-materiais">
            <tr>
                <th>Material</th>
                <th>Quantidade Atual</th>
                <th>Ações</th>
            </tr>
        </table>
    </div>
    <div id="modal-retirada" class="modal">
        <div class="modal-conteudo">
            <h3>Baixar Estoque</h3>
            <p>Informe a quantidade que deseja retirar:</p>
            <input type="number" id="input-retirada" placeholder="Quantidade">
            <button id="btn-confirmar-baixa">Confirmar</button>
            <button id="btn-cancelar-baixa">Cancelar</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>

</html>
